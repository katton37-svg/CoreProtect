name: Build v24 Fix
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Build
        # "shade:shade" を追加して、バラバラの部品をすべて強制合体させます
        run: mvn -B install shade:shade -DskipTests
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-v24-Final
          # 一番ファイルサイズが大きい（通常5MB以上）ものが完成品です
          path: "**/target/CoreProtect-*.jar"
