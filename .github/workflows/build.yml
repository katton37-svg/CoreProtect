name: Build v24 (Version Fix Final)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Patch CoreProtect Version Check
        # バージョン判定メソッドそのものを「常にtrue（サポート済み）」を返すように強制書き換えします
        run: |
          find . -name "Config.java" -exec sed -i 's/int supported = java_check/int supported = 1; \/\/ java_check/g' {} +
          find . -name "Config.java" -exec sed -i 's/supported = server_check/supported = 1; \/\/ server_check/g' {} +
      - name: Build with Maven
        run: mvn -B install shade:shade -DskipTests
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-v24-Fixed
          path: "**/target/CoreProtect-*.jar"
