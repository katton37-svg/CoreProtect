name: Build v24 (No Version Limit)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Patch Version Check
        # バージョンチェックを行っている箇所を強制的に「常にtrue（許可）」に書き換えます
        run: |
          find . -name "*.java" -exec sed -i 's/if (supported == 0)/if (false)/g' {} +
          find . -name "*.java" -exec sed -i 's/if (supported == -1)/if (false)/g' {} +
      - name: Build with Maven
        run: mvn -B install shade:shade -DskipTests
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-v24-Patched
          path: "**/target/CoreProtect-*.jar"
