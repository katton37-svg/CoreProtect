name: Build v24
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Java 25
        run: |
          # Java 25 (Early Access) を直接ダウンロード
          wget https://java.net
          tar -xzf openjdk-25-ea+12_linux-x64_bin.tar.gz
          # パスを強制的に上書き
          echo "JAVA_HOME=$GITHUB_WORKSPACE/jdk-25" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/jdk-25/bin" >> $GITHUB_PATH

      - name: Build with Maven
        run: |
          # Javaバージョンを確認してからビルド
          java -version
          mvn -B package -DskipTests

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-v24
          path: target/*.jar
