name: Build v24 (Java 25)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25 (Early Access)
        uses: actions/setup-java@v4
        with:
          java-version: '25-ea' # Java 25の早期アクセス版を指定
          distribution: 'oracle' # Oracle JDKなら最新版が提供されています
      - name: Build with Maven
        run: mvn -B package -DskipTests
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-v24-Java25
          path: target/*.jar
