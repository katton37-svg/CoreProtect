name: Build v24 (Ultimate Fix)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Patch CoreProtect Version Logic
        run: |
          # Functions.java 内のバージョン判定を強制的に「1 (サポート済み)」に書き換えます
          find . -name "Functions.java" -exec sed -i 's/int supported = java_check/int supported = 1; \/\/ java_check/g' {} +
          find . -name "Functions.java" -exec sed -i 's/supported = server_check/supported = 1; \/\/ server_check/g' {} +
          # Config.java 内の同様の箇所も念のため書き換え
          find . -name "Config.java" -exec sed -i 's/int supported = java_check/int supported = 1; \/\/ java_check/g' {} +
          find . -name "Config.java" -exec sed -i 's/supported = server_check/supported = 1; \/\/ server_check/g' {} +
      - name: Build with Maven
        run: mvn -B install shade:shade -DskipTests
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-v24-Fixed
          path: "**/target/CoreProtect-*.jar"
