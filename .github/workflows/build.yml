name: Build v24 (Version Spoof)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Version Spoofing
        # プロジェクトのバージョン設定を直接 26.1.2 に書き換えて、チェックをスルーさせます
        run: |
          sed -i 's/<version>23.2<\/version>/<version>26.1.2<\/version>/g' pom.xml
          # バージョン判定メソッドを力ずくで書き換える（sedを確実に当てる）
          grep -l "supported = " -r . | xargs sed -i 's/supported = [^;]*/supported = 1/g'
      - name: Build with Maven
        run: mvn -B install shade:shade -DskipTests
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect-v24-Spoofed
          path: "**/target/CoreProtect-*.jar"
